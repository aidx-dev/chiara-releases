name: Release

# ⚠️ Este fichero NO va en el repo privado. Cópialo al repo PÚBLICO de releases
#    (aidx-dev/aidx-releases) en la ruta .github/workflows/release.yml
#
# Qué hace:
#  1. Se dispara desde el repo privado (trigger-release.yml) o a mano.
#  2. Hace checkout del código FUENTE del repo privado en el tag/sha indicado.
#  3. Compila para macOS (Apple Silicon) y Windows en paralelo.
#  4. Firma los artefactos del updater y publica instaladores + latest.json
#     como una GitHub Release EN ESTE repo público.
#
# Canales:
#  - channel=stable   → prerelease=false → actualiza latest.json estable
#  - channel=rc       → prerelease=true  → release pre-release; NO toca latest estable
#  - channel=snapshot → prerelease=true  → idem, con versión automática dev.TIMESTAMP.RUN
#
# Secrets necesarios en el repo público:
#  - SOURCE_REPO_TOKEN                  PAT (fine-grained) con "Contents: read" sobre aidx-dev/aidx
#  - TAURI_SIGNING_PRIVATE_KEY          contenido de ~/.tauri/clinic-desktop.key
#  - TAURI_SIGNING_PRIVATE_KEY_PASSWORD contraseña de esa clave
#  (GITHUB_TOKEN es automático y basta para crear la release en este repo)

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: "Tag o SHA del repo privado a compilar (ej. v0.1.1 o abc1234)"
        required: true
      prerelease:
        description: "true para RC/snapshot, false para stable"
        required: false
        default: "false"
      channel:
        description: "stable | rc | snapshot"
        required: false
        default: "stable"
      snapshot_version:
        description: "Versión a usar en snapshots (ej. 0.0.0-dev.20260713153045.1234)"
        required: false
        default: ""

jobs:
  publish:
    permissions:
      contents: write # crear la release + el tag en este repo público
    strategy:
      fail-fast: false
      matrix:
        include:
          # NO usar macos-latest: es un blanco móvil (GitHub rota la imagen y el
          # Xcode por defecto). Con Xcode 16.3+ el enlazado de `ort` rompe con
          # "ld: library 'clang_rt.osx' not found". macos-14 es Apple Silicon
          # estable y trae Xcode 16.2 instalado (lo fijamos abajo).
          - platform: macos-14 # Apple Silicon (M1/M2/M3)
            args: "--target aarch64-apple-darwin"
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout del código privado (tag ${{ inputs.source_ref }})
        uses: actions/checkout@v4
        with:
          repository: aidx-dev/aidx
          ref: ${{ inputs.source_ref }}
          token: ${{ secrets.SOURCE_REPO_TOKEN }}
          path: source
          lfs: false # los modelos (8 GB) no se bundlean; no hacen falta para compilar

      # Fija Xcode 16.2, que sí incluye libclang_rt.osx.a. Xcode 16.3+ reubicó esa
      # librería estática y la crate `ort` (ONNX Runtime) falla al enlazar con
      # "ld: library 'clang_rt.osx' not found". Requiere que el runner tenga esa
      # versión instalada: por eso arriba fijamos macos-14 (no macos-latest).
      - name: Seleccionar Xcode compatible (solo macOS)
        if: runner.os == 'macOS'
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.2"

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ startsWith(matrix.platform, 'macos') && 'aarch64-apple-darwin' || '' }}

      - name: Cache de compilación de Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: source/src-tauri
          # El build script de `ort` graba en target/ las rutas de enlazado del
          # toolchain (clang de Xcode) y su carpeta de descarga de ONNX Runtime. Si
          # se restaura una caché creada con OTRO Xcode, cargo NO re-ejecuta el
          # build script y el enlazado apunta a un clang que ya no existe
          # ("clang_rt.osx not found"). Metemos la versión de Xcode en la clave para
          # que un cambio de Xcode invalide la caché y fuerce un build limpio.
          prefix-key: "v2-rust-xcode16.2"

      - name: Aplicar versión snapshot
        if: inputs.channel == 'snapshot'
        working-directory: source
        shell: bash
        run: |
          VERSION="${{ inputs.snapshot_version }}"
          # Sobrescribir versión en tauri.conf.json
          jq --arg v "$VERSION" '.version = $v' src-tauri/tauri.conf.json \
            > src-tauri/tauri.conf.json.tmp && mv src-tauri/tauri.conf.json.tmp src-tauri/tauri.conf.json
          # Redirigir el updater al canal snapshot-channel en lugar de releases/latest
          # (releases/latest solo sirve releases no-prerelease; los snapshots nunca aparecerían)
          jq '.plugins.updater.endpoints = ["https://github.com/aidx-dev/chiara-releases/releases/download/snapshot-channel/latest.json"]' \
            src-tauri/tauri.conf.json \
            > src-tauri/tauri.conf.json.tmp && mv src-tauri/tauri.conf.json.tmp src-tauri/tauri.conf.json
          echo "Versión aplicada: $VERSION"

      - name: Aplicar endpoint RC
        if: inputs.channel == 'rc'
        working-directory: source
        shell: bash
        run: |
          # releases/latest solo sirve no-prerelease → rc.1 no detectaría rc.2.
          # rc-channel es una release fija (igual que snapshot-channel) que siempre
          # apunta al RC más reciente. RC→stable también funciona: cuando exista una
          # stable, su versión será mayor y el updater la preferirá sobre rc-channel.
          jq '.plugins.updater.endpoints = ["https://github.com/aidx-dev/chiara-releases/releases/download/rc-channel/latest.json"]' \
            src-tauri/tauri.conf.json \
            > src-tauri/tauri.conf.json.tmp && mv src-tauri/tauri.conf.json.tmp src-tauri/tauri.conf.json
          echo "Endpoint RC aplicado"

      - name: Instalar create-dmg (macOS)
        if: runner.os == 'macOS'
        run: brew install create-dmg

      - name: Instalar dependencias del frontend
        working-directory: source
        run: npm ci

      - name: Calcular tag y nombre de release
        id: release_meta
        shell: bash
        run: |
          if [[ "${{ inputs.channel }}" == "snapshot" ]]; then
            TAG="${{ inputs.snapshot_version }}"
            NAME="Chiara Clinic (snapshot) ${{ inputs.snapshot_version }}"
            BODY="Build automático desde develop. NO usar en producción."
          elif [[ "${{ inputs.channel }}" == "rc" ]]; then
            TAG="${{ inputs.source_ref }}"
            NAME="Chiara Clinic ${{ inputs.source_ref }}"
            BODY="Release candidate. Validar antes de promover a stable."
          else
            TAG="${{ inputs.source_ref }}"
            NAME="Chiara Clinic ${{ inputs.source_ref }}"
            BODY="Descarga el instalador de tu sistema abajo. La app se autoactualiza al arrancar."
          fi
          echo "tag=${TAG}"   >> "$GITHUB_OUTPUT"
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"
          echo "body=${BODY}" >> "$GITHUB_OUTPUT"

      - name: Calcular args de compilación
        id: build_args
        shell: bash
        run: |
          ARGS="${{ matrix.args }}"
          # WiX/MSI requiere que el pre-release identifier sea numérico y ≤ 65535.
          # Las versiones snapshot (ej. 0.0.0-dev.20260713153045.1234) rompen ese
          # requisito → usamos NSIS en su lugar, que no tiene esa restricción
          # y también genera el artefacto del updater (.nsis.zip).
          if [[ "${{ inputs.channel }}" == "snapshot" && "${{ runner.os }}" == "Windows" ]]; then
            ARGS="$ARGS --bundles nsis"
          fi
          echo "args=${ARGS}" >> "$GITHUB_OUTPUT"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: source
          tagName: ${{ steps.release_meta.outputs.tag }}
          releaseName: ${{ steps.release_meta.outputs.name }}
          releaseBody: ${{ steps.release_meta.outputs.body }}
          releaseDraft: ${{ inputs.channel == 'stable' }}  # solo stable se revisa como borrador
          prerelease: ${{ inputs.prerelease == 'true' }}
          args: ${{ steps.build_args.outputs.args }}

  # Job independiente que se ejecuta UNA SOLA VEZ cuando ambos runners (mac + win)
  # han terminado. Copia latest.json de la release recién publicada a la release
  # fija "snapshot-channel", que actúa como endpoint estable para el updater.
  # Los builds de snapshot apuntan su updater a:
  #   https://github.com/aidx-dev/chiara-releases/releases/download/snapshot-channel/latest.json
  update-snapshot-channel:
    needs: publish
    if: ${{ inputs.channel == 'snapshot' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Actualizar release snapshot-channel
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ inputs.snapshot_version }}"
          REPO="${{ github.repository }}"

          # Descargar latest.json de la release recién publicada
          gh release download "${VERSION}" \
            --repo "${REPO}" \
            --pattern "latest.json" \
            --output latest.json

          # SHA de main para anclar el tag snapshot-channel
          MAIN_SHA=$(gh api "repos/${REPO}/git/ref/heads/main" --jq '.object.sha')

          # Borrar release y tag existentes (se recrean frescos)
          gh release delete snapshot-channel --repo "${REPO}" --yes 2>/dev/null || true
          gh api "repos/${REPO}/git/refs/tags/snapshot-channel" -X DELETE 2>/dev/null || true

          # Crear tag snapshot-channel apuntando a main
          gh api "repos/${REPO}/git/refs" \
            -f ref="refs/tags/snapshot-channel" \
            -f sha="${MAIN_SHA}"

          # Crear release snapshot-channel con el latest.json
          gh release create snapshot-channel \
            --repo "${REPO}" \
            --title "Snapshot Channel (auto-update endpoint)" \
            --notes "Endpoint del updater para builds de develop. Se sobreescribe en cada push. Versión actual: ${VERSION}" \
            --prerelease \
            latest.json

  # Job independiente que se ejecuta UNA SOLA VEZ cuando ambos runners (mac + win)
  # han terminado. Copia latest.json de la release recién publicada a la release
  # fija "rc-channel", que actúa como endpoint estable para el updater de RCs.
  # Los builds RC apuntan su updater a:
  #   https://github.com/aidx-dev/chiara-releases/releases/download/rc-channel/latest.json
  update-rc-channel:
    needs: publish
    if: ${{ inputs.channel == 'rc' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Actualizar release rc-channel
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ inputs.source_ref }}"
          REPO="${{ github.repository }}"

          # Descargar latest.json de la release recién publicada
          gh release download "${VERSION}" \
            --repo "${REPO}" \
            --pattern "latest.json" \
            --output latest.json

          # SHA de main para anclar el tag rc-channel
          MAIN_SHA=$(gh api "repos/${REPO}/git/ref/heads/main" --jq '.object.sha')

          # Borrar release y tag existentes (se recrean frescos)
          gh release delete rc-channel --repo "${REPO}" --yes 2>/dev/null || true
          gh api "repos/${REPO}/git/refs/tags/rc-channel" -X DELETE 2>/dev/null || true

          # Crear tag rc-channel apuntando a main
          gh api "repos/${REPO}/git/refs" \
            -f ref="refs/tags/rc-channel" \
            -f sha="${MAIN_SHA}"

          # Crear release rc-channel con el latest.json
          gh release create rc-channel \
            --repo "${REPO}" \
            --title "RC Channel (auto-update endpoint)" \
            --notes "Endpoint del updater para release candidates. Se sobreescribe con cada RC. Versión actual: ${VERSION}" \
            --prerelease \
            latest.json
